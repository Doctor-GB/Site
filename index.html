<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портфолио карточек</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="toolbar">
    <div class="ctrl-group">
      <button class="ctrl active" data-dir="ltr" onclick="setDir('ltr')">LTR</button>
      <button class="ctrl" data-dir="rtl" onclick="setDir('rtl')">RTL</button>
      <button class="ctrl" data-lang="ru" onclick="setLang('ru')">RU</button>
<button class="ctrl" data-lang="en" onclick="setLang('en')">EN</button>
<button class="ctrl" data-lang="ar" onclick="setLang('ar')">AR</button>
    </div>
    <div class="divider"></div>
    <div class="ctrl-group">
      <label>Primary</label>
      <input type="color" class="color-input" value="#2563eb" onchange="changeBaseColor('--base-primary', this.value)">
    </div>
    <div class="ctrl-group">
      <label>Secondary</label>
      <input type="color" class="color-input" value="#475569" onchange="changeBaseColor('--base-secondary', this.value)">
    </div>
    <div class="ctrl-group">
      <label>Accent</label>
      <input type="color" class="color-input" value="#9333ea" onchange="changeBaseColor('--base-accent', this.value)">
    </div>
    <div class="ctrl-group">
      <label>Warning</label>
      <input type="color" class="color-input" value="#d97706" onchange="changeBaseColor('--base-warning', this.value)">
    </div>
    <div class="ctrl-group">
      <label>Error</label>
      <input type="color" class="color-input" value="#e11d48" onchange="changeBaseColor('--base-error', this.value)">
    </div>
  </div>

  <h1>Моя страница с карточками</h1>
  <input type="text" class="demo-input" placeholder="Проверка направления ввода..." dir="inherit">

  <div class="wrap" id="app"></div>

  <script src="script.js"></script>
</body>
</html>
